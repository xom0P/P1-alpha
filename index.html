<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Neon Chronicles</title>
    <style>
        :root {
            --neon-green: #00ff66;
            --glass-bg: rgba(255, 255, 255, 0.04);
            --glass-border: rgba(255, 255, 255, 0.9);
            --glow: 0 0 12px rgba(255, 255, 255, 0.5), inset 0 0 8px rgba(255, 255, 255, 0.2);
            --text-main: #ffffff;
            --text-muted: #a0a0a0;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #050505;
            background-image: radial-gradient(circle at 50% top, rgba(0, 200, 50, 0.25) 0%, #050505 40%);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
            flex: 1;
            width: 100%;
            box-sizing: border-box;
        }

        /* Header & Navigation */
        .site-title {
            text-align: center;
            font-size: 2rem;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 2rem;
            text-transform: uppercase;
        }

        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-bottom: 3rem;
            flex-wrap: wrap;
        }

        .nav-pill {
            background: var(--glass-bg);
            border: 2px solid var(--glass-border);
            box-shadow: var(--glow);
            border-radius: 50px;
            padding: 0.8rem 3rem;
            color: var(--text-main);
            text-decoration: none;
            font-weight: 700;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: all 0.3s ease;
        }

        .nav-pill:hover {
            background: rgba(255, 255, 255, 0.1);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.8), inset 0 0 12px rgba(255, 255, 255, 0.4);
            transform: translateY(-2px);
        }

        /* Grid Layout */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }

        /* Footer */
        .footer-bar {
            background: rgba(10, 40, 20, 0.8);
            border-top: 1px solid rgba(255,255,255,0.2);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 20px 20px 0 0;
            backdrop-filter: blur(10px);
            font-size: 0.85rem;
        }

        .social-icons {
            display: flex;
            gap: 1rem;
        }

        .social-circle {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: white;
            display: inline-block;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .nav-bar { flex-direction: column; align-items: center; }
            .nav-pill { width: 80%; text-align: center; }
            .footer-bar { flex-direction: column; gap: 1rem; text-align: center; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="site-title">XOM669-str</div>
        
        <nav class="nav-bar">
            <a href="#" class="nav-pill">LATEST</a>
            <a href="#" class="nav-pill">CATEGORIES</a>
            <a href="#" class="nav-pill">ABOUT</a>
            <a href="#" class="nav-pill">SEARCH</a>
        </nav>

        <div class="grid" id="posts-grid"></div>

    </div>

    <footer class="footer-bar">
        <div>THE NEON CHRONICLES © 2024 | DESIGNED FOR BLOGGERS</div>
        <div class="social-icons">
            <a href="/admin.html" class="social-circle" style="text-decoration: none; cursor: pointer;"></a>
            <span class="social-circle"></span>
            <span class="social-circle"></span>
            <span class="social-circle"></span>
        </div>
    </footer>

    <script>
        async function fetchAndDisplayPosts() {
            const grid = document.getElementById('posts-grid');
            
            try {
                // 1. Fetch data from your Python backend
                const response = await fetch('/api/posts');
                const posts = await response.json();
                
                // 2. Clear out any loading text
                grid.innerHTML = '';
                
                // 3. Loop through every post and build the HTML
                posts.forEach(post => {
                    // Create the glass card
                    const card = document.createElement('div');
                    card.style.background = 'rgba(255, 255, 255, 0.04)';
                    card.style.backdropFilter = 'blur(12px)';
                    card.style.border = '2px solid rgba(255, 255, 255, 0.9)';
                    card.style.borderRadius = '20px';
                    card.style.padding = '1.5rem';
                    card.style.boxShadow = '0 0 12px rgba(255, 255, 255, 0.5), inset 0 0 8px rgba(255, 255, 255, 0.2)';
                    card.style.color = '#fff';
                    card.style.display = 'flex';
                    card.style.flexDirection = 'column';
                    card.style.gap = '1rem';
                    card.style.transition = 'transform 0.3s ease';
                    
                    // Hover effect logic
                    card.onmouseover = () => card.style.transform = 'translateY(-5px)';
                    card.onmouseout = () => card.style.transform = 'translateY(0)';

                    let contentHTML = '';
                    
                    // If there is an image, put it at the top
                    if (post.image_url) {
                        contentHTML += `<img src="${post.image_url}" alt="Cover" style="width: 100%; border-radius: 10px; object-fit: cover; max-height: 250px;">`;
                    }
                    
                    // Add the title and text below
                    contentHTML += `<h2 style="margin: 0; color: #00ff66; text-transform: uppercase; letter-spacing: 1px; font-size: 1.6rem; line-height: 1.2;">${post.title}</h2>`;
                    contentHTML += `<p style="margin: 0; line-height: 1.6; opacity: 0.9; font-size: 0.95rem; color: #d0d0d0;">${post.content}</p>`;
                    
                    card.innerHTML = contentHTML;
                    grid.appendChild(card);
                });
                
            } catch (error) {
                console.error("Error loading the grid:", error);
                grid.innerHTML = '<div style="color: #ff4444; text-align: center; width: 100%;">Failed to load transmissions from the network.</div>';
            }
        }

        // Run this function the second the page loads!
        window.onload = fetchAndDisplayPosts;
    </script>
</body>
</html>
